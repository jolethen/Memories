<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minetest Server Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #61afef;
            --text-main: #abb2bf;
            --text-bright: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 90%;
            max-width: 900px;
            padding: 40px 0;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--accent);
            line-height: 1.5;
        }

        .archive-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 {
            color: var(--text-bright);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .write-here {
            background: #252525;
            padding: 15px;
            border: 1px dashed #444;
            color: #dcdcdc;
            min-height: 100px;
            white-space: pre-wrap; /* Keeps your formatting */
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 50px;
        }

        /* Responsive tweak */
        @media (max-width: 600px) {
            h1 { font-size: 1rem; }
            .archive-section { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>MINETEST SERVER:<br>[SERVER NAME]</h1>
            <p>The Official Origin Archive</p>
        </header>

        <section class="archive-section">
            <h2>The Beginning</h2>
            <div class="write-here">
                It all started when...
            </div>
        </section>

        <section class="archive-section">
            <h2>The First Settlement</h2>
            <div class="write-here">
                </div>
        </section>

        <section class="archive-section">
            <h2>Legendary Players</h2>
            <div class="write-here">
                </div>
        </section>

        <footer>
            Hosted on GitHub Pages | Minetest Archive Template
        </footer>
    </div>

</body>
  </html>
